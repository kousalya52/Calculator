<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="Calculator.css">
</head>

<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input type="text" id="display" readonly>
            </div>
            <div>
                <button class="coo" onclick="display.value = '' ">C</button>
                <button class="coo" onclick="display.value = display.value.slice(0, -1) ">DEL</button>
                <button class="op" onclick="display.value +='.' ">.</button>
                <button class="op" onclick="display.value +='/' ">/</button>
            </div>
            <div>
                <button onclick="display.value +='7' ">7</button>
                <button onclick="display.value +='8' ">8</button>
                <button onclick="display.value +='9' ">9</button>
                <button class="op" onclick="display.value +='*' ">*</button>
            </div>
            <div>
                <button onclick="display.value +='4' ">4</button>
                <button onclick="display.value +='5' ">5</button>
                <button onclick="display.value +='6' ">6</button>
                <button class="op" onclick="display.value +='-' ">-</button>
            </div>
            <div>
                <button onclick="display.value +='1' ">1</button>
                <button onclick="display.value +='2' ">2</button>
                <button onclick="display.value +='3' ">3</button>
                <button class="op" onclick="display.value +='+' ">+</button>
            </div>
            <div>
                <button onclick="display.value +='00' ">00</button>
                <button onclick="display.value +='0' ">0</button>
                <button class="equal" onclick="display.value = eval(display.value)">=</button>
            </div>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: palevioletred
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            background: #3a4452;
            padding: 20px;
            border-radius: 20px;
            box-shadow: -8px -8px 15px rgba(255, 255, 255, 0.1), 5px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .display {
            margin-bottom: 15px;
        }

        .display input {
            width: 100%;
            height: 80px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: dimgrey;
            color: white;
            text-align: right;
            padding-right: 15px;
            font-size: 40px;
        }

        .calculator div:not(.display) {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .calculator button {
            border: none;
            outline: none;
            height: 65px;
            border-radius: 12px;
            background: transparent;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: -2px -2px 10px rgba(255, 255, 255, 0.1), 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .calculator button.coo {
            background: firebrick;
        }

        .calculator button.op {
            background: lightslategray;
        }

        .calculator button.equal {
            grid-column: span 2;
            background: teal;
        }

        @media (max-width: 1440px) {
            .calculator {
                width: 420px;
            }
        }

        @media (max-width: 1024px) {
            .calculator {
                width: 400px;
            }

            .calculator button {
                height: 60px;
                font-size: 20px;
            }

            .display input {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .calculator {
                width: 360px;
                padding: 18px;
            }

            .calculator button {
                height: 55px;
                font-size: 18px;
            }

            .display input {
                height: 70px;
                font-size: 32px;
            }
        }

        @media (max-width: 425px) {
            .calculator {
                width: 100%;
                max-width: 350px;
                padding: 15px;
            }

            .calculator button {
                height: 52px;
                font-size: 18px;
            }

            .display input {
                height: 65px;
                font-size: 28px;
            }
        }

        @media (max-width: 375px) {
            .calculator {
                max-width: 320px;
                padding: 12px;
            }

            .calculator div:not(.display) {
                gap: 6px;
            }

            .calculator button {
                height: 48px;
                font-size: 16px;
            }

            .display input {
                height: 60px;
                font-size: 24px;
            }
        }

        @media (max-width: 320px) {
            .calculator {
                max-width: 290px;
                padding: 10px;
            }

            .calculator div:not(.display) {
                gap: 5px;
            }

            .calculator button {
                height: 42px;
                font-size: 14px;
            }

            .display input {
                height: 55px;
                font-size: 20px;
            }
        }
    </style>

</body>

</html>
